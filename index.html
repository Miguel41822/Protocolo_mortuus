<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tela-entrada">
        <h1>⚔️ Portal da Aventura ⚔️</h1>
        <p>Insira os dados do seu herói para cruzar os portões.</p>

        <!-- Formulário de Entrada -->
        <form id="form-entrada">
            <div class="campo">
                <label for="nome">Nome do Personagem:</label>
                <input type="text" id="nome" placeholder="Ex: Aragorn, Jinx..." required>
</div>

            <div class="campo">
                <label for="classe">Escolha sua Classe:</label>
                <select id="classe" required>
                    <option value="" disabled selected>Selecione...</option>
                    <option value="Guerreiro">🛡️ Guerreiro (Força e Defesa)</option>
                    <option value="Mago">🔮 Mago (Magia e Conhecimento)</option>
                    <option value="Ladino">🗡️ Ladino (Agilidade e Furtividade)</option>
                    <option value="Clérigo">✨ Clérigo (Cura e Fé)</option>
                </select>
            </div>

            <button type="submit" id="btn-entrar">Iniciar Jornada</button>
        </form>
    </div>

</body>
</html>
